    <button id="openModal" class="callback-button" aria-label="Передзвонити вам">Передзвонити</button>

    <div class="overlay" id="modalOverlay">
  <div class="modal">
    
    <button class="modal__close" type="button">×</button>
    <h2 class="modal__title">Зворотній дзвінок</h2>
    <p class="modal__text">Вкажіть ваш номер телефону та ім'я. Ми зателефонуємо вам найближчим часом.</p>
    <form class="modal__form">
      <ul class="modal__list">
        <li class="modal__item">
          <label class="modal__label" for="name">Ім'я</label>
          <input class="modal__input" type="text" id="name" placeholder="Ваше ім'я">
        </li>
        <li class="modal__item">
          <label class="modal__label" for="phone">Телефон</label>
          <input class="modal__input" type="tel" id="phone" placeholder="+380">
        </li>
      </ul>
      <button class="modal__button" type="submit">Надіслати</button>
    </form>
  </div>
